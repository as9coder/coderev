# Copy this file to: YOUR_REPO/.github/workflows/coderev.yml
#
# Then in YOUR_REPO set (Settings → Actions):
#   Variables: CODEREV_ALLOWED_USER = your GitHub username
#   Secrets:    OPENROUTER_API_KEY
#
# You can use org-level variables/secrets if you prefer.

name: CodeRev

on:
  issue_comment:
    types: [created]

concurrency:
  group: coderev-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@coderev') &&
      vars.CODEREV_ALLOWED_USER != '' &&
      github.actor == vars.CODEREV_ALLOWED_USER
    uses: as9coder/coderev/.github/workflows/coderev-reusable.yml@main
    with:
      target_repository: ${{ github.repository }}
    secrets: inherit
